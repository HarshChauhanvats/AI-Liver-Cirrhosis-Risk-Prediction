<!DOCTYPE html>
<html>

<head>

    <title>Hospital Analytics Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f4f7fb;
        }

        .container{
            padding:30px;
        }

        h1{
            color:#1e293b;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:20px;
            margin-top:30px;
        }

        /* Updated Card Container - Solid Block Style */
        .card {
            padding: 25px;
            border-radius: 4px; 
            box-shadow: 1px 2px 5px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid #cbd5e1;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 2px 4px 10px rgba(0,0,0,0.15);
        }

        /* Updated Headings */
        .card h2 {
            margin: 0;
            color: #333333;
            font-size: 18px;
            font-weight: 500;
            text-align: left;
        }

        /* Updated Numbers - Tableau Blue */
        .card p {
            font-size: 42px;
            margin-top: 15px;
            margin-bottom: 0;
            font-weight: 500;
            color: #3876b5; 
        }

        /* Solid Background Colors Matching Your Image */
        .card-total { background-color: #dcedf6; } 
        .card-risk { background-color: #fad2d2; }  
        .card-conf { background-color: #d1d3d4; }  
        .card-bili { background-color: #fbb38a; }

        .charts{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:30px;
            margin-top:40px;
        }

        .chart-box{
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.08);
        }

    </style>

</head>

<body>

<div style="display:flex;">

    <div style="width:220px; background:#1e293b; min-height:100vh; padding:20px; color:white;">
        <h2 style="color:#38bdf8;">Hospital Panel</h2>
        <br>
        
        <a href="/">
            <button style="width:100%; padding:12px; margin-bottom:15px; background:#2563eb; color:white; border:none; border-radius:8px; cursor:pointer;">
                Home / Predict
            </button>
        </a>

        <a href="/dashboard">
            <button style="width:100%; padding:12px; margin-bottom:20px; background:#2563eb; color:white; border:none; border-radius:8px; cursor:pointer;">
                Open Dashboard
            </button>
        </a>

        <form action="/bulk_predict" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" accept=".csv" required style="margin-bottom:15px; width:100%; color:white;">
            <button type="submit" style="width:100%; padding:12px; background:#16a34a; color:white; border:none; border-radius:8px; cursor:pointer;">
                Upload CSV
            </button>
        </form>
    </div>

    <div style="flex:1; padding:20px; overflow-x:hidden;">
<div class="container">

    <h1>AI Hospital Analytics Dashboard</h1>

    <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0px 2px 10px rgba(0,0,0,0.05); margin-top: 20px; display: flex; justify-content: space-between; align-items: center;">
        <div>
            <h2 style="margin: 0; color: #1e293b; font-size: 18px;">Lookup Patient</h2>
            <p style="margin: 5px 0 0 0; color: #64748b; font-size: 14px;">Enter a Patient ID to view their clinical history and risk report.</p>
        </div>
        <form action="/patient" method="GET" style="display: flex; gap: 10px;">
            <input type="number" name="id" placeholder="Patient ID (e.g., 14)" required 
                   style="padding: 12px 15px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 16px; outline: none;">
            <button type="submit" 
                    style="background: #0f766e; color: white; border: none; padding: 0 20px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;">
                Search
            </button>
        </form>
    </div>

    <!-- KPI CARDS -->

    <div class="cards">

        <div class="card card-total">
            <h2>Total Cases</h2>
            <p>{{ total_cases }}</p>
        </div>

        <div class="card card-risk">
            <h2>High Risk</h2>
            <p>{{ high_risk }}</p>
        </div>

        <div class="card card-conf">
            <h2>Avg. AI Confidence</h2>
            <p>{{ avg_confidence }}</p>
        </div>

        <div class="card card-bili">
            <h2>Average Bilirubin</h2>
            <p>{{ avg_bilirubin }}</p>
        </div>

    </div>


    <!-- CHARTS -->

    <div class="charts">

        <div class="chart-box">

            <canvas id="piechart"></canvas>

        </div>

        <div class="chart-box">

            <canvas id="barchart"></canvas>

        </div>

    </div>

</div>

<script>

const pieCtx = document.getElementById('piechart');

new Chart(pieCtx, {

    type: 'pie',

    data: {

        labels: ['High Risk', 'Low Risk'],

        datasets: [{

            data: [{{ high_risk }}, {{ low_risk }}],

            backgroundColor: [
                '#ef4444',
                '#22c55e'
            ]
        }]
    }
});

const barCtx = document.getElementById('barchart');

new Chart(barCtx, {

    type: 'bar',

    data: {

        labels: {{ ids | tojson }},

        datasets: [{

            label: 'Confidence',

            data: {{ confidences | tojson }},

            backgroundColor: {{ colors | tojson }}
        }]
    },

    options: {

        responsive: true,

        scales: {

            y: {

                beginAtZero: true,

                max: 100
            }
        }
    }
});

</script>

    </div> </div> </body>

</html>
